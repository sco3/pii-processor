# .tarpaulin.toml

# Exclude build output and generated files from coverage
exclude-files = [
    "target/debug/build/basic-cookies-*/out/*"
]

# Optional: Exclude test and example files
exclude-files = [
    "tests/*",
    "examples/*",
    "target/debug/build/basic-cookies-*/out/*"
]

# Optional: Exclude specific modules or files by name
# exclude = ["mod_name", "file_name.rs"]

# Optional: Set the output format (e.g., lcov, xml, html, json)
# run-types = ["Tests"]
# out = ["Html"]

# Optional: Ignore panics in coverage
ignore-panics = true

# Optional: Set the timeout for test execution (in seconds)
timeout = 60

# Optional: Enable line coverage (default is true)
line-coverage = true

# Optional: Enable branch coverage
branch = false